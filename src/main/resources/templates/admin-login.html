<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('Admin Login - DineDrop')}"></head>

<style>

    /* ===== iOS 26 GLASS BACKGROUND ===== */

    body{
        min-height:100vh;

        background:
                linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.55)),
                url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1600');

        background-size:cover;
        background-position:center;
        background-attachment:fixed;

        font-family:"SF Pro Display", sans-serif;

        color:white;

        text-shadow:0 1px 3px rgba(0,0,0,0.45);
    }

    /* Glow */

    body::before,
    body::after{
        content:'';
        position:fixed;
        width:320px;
        height:320px;
        border-radius:50%;
        filter:blur(100px);
        z-index:0;
    }

    body::before{
        background:#ff9966;
        top:-120px;
        left:-100px;
        opacity:0.45;
    }

    body::after{
        background:#6dd5fa;
        bottom:-120px;
        right:-100px;
        opacity:0.4;
    }

    /* Layer */

    .container{
        position:relative;
        z-index:2;
    }

    /* ===== AUTH CARD ===== */

    .auth-card{

        max-width:420px;

        margin:80px auto;

        padding:35px;

        background:rgba(20,20,20,0.35);

        backdrop-filter:blur(22px);
        -webkit-backdrop-filter:blur(22px);

        border:1px solid rgba(255,255,255,0.15);

        border-radius:32px;

        box-shadow:0 8px 32px rgba(0,0,0,0.3);

        color:white;
    }

    /* ===== IMPROVED TITLE VISIBILITY ===== */

    .auth-card h2{
        font-weight:800;
        font-size:30px;
        letter-spacing:0.6px;

        color:#ffffff;

        text-shadow:
                0 2px 10px rgba(0,0,0,0.7),
                0 0 25px rgba(255,255,255,0.25);
    }

    /* Titles */

    .auth-card h3{
        font-weight:700;
    }

    .text-muted{
        color:rgba(255,255,255,0.75) !important;
    }

    /* Inputs */

    .form-control{
        background:rgba(255,255,255,0.10) !important;

        border:1px solid rgba(255,255,255,0.15) !important;

        color:white !important;

        border-radius:14px;

        padding:12px;

        font-weight:500;
    }

    .form-control::placeholder{
        color:rgba(255,255,255,0.6);
    }

    .form-control:focus{
        box-shadow:none;
        border-color:rgba(255,255,255,0.35) !important;
    }

    /* Labels */

    label{
        font-weight:600;
        margin-bottom:6px;
        color:rgba(255,255,255,0.85);
    }

    /* Button */

    .btn-brand{
        background:rgba(255,255,255,0.18);

        border:1px solid rgba(255,255,255,0.18);

        color:white !important;

        font-weight:600;

        border-radius:16px;

        padding:12px;

        transition:0.3s;
    }

    .btn-brand:hover{
        background:rgba(255,255,255,0.28);
    }

    /* Alert */

    .alert{
        border:none;

        border-radius:18px;

        backdrop-filter:blur(15px);

        color:white;
    }

    .alert-danger{
        background:rgba(220,53,69,0.18);
    }

    /* Footer text */

    .small{
        color:rgba(255,255,255,0.7);
    }

    /* Center alignment tweaks */

    .text-center{
        text-align:center;
    }

    /* Responsive */

    @media(max-width:768px){
        .auth-card{
            margin:40px 15px;
            padding:25px;
        }
    }

</style>

<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container">

    <div class="auth-card">

        <!-- IMPROVED TITLE -->
        <h2 class="text-center mb-1">
            🔐 Admin Login
        </h2>

        <p class="text-center text-muted">
            Restricted area
        </p>

        <!-- Error -->

        <div class="alert alert-danger"
             th:if="${error}"
             th:text="${error}">
        </div>

        <!-- Form -->

        <form method="post"
              th:action="@{/admin-login}">

            <div class="mb-3">

                <label>Admin Email</label>

                <input class="form-control"
                       type="email"
                       name="email"
                       value=""
                       required>

            </div>

            <div class="mb-3">

                <label>Password</label>

                <input class="form-control"
                       type="password"
                       name="password"
                       required>

            </div>

            <button class="btn btn-brand w-100">
                Login as Admin
            </button>

        </form>

        <p class="text-center mt-3 small text-muted">



        </p>

    </div>

</div>

<div th:replace="~{fragments :: scripts}"></div>

</body>
</html>
