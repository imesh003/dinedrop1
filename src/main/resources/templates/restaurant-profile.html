<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Restaurant Profile - DineDrop')}"></head>
<style>
    body{background:linear-gradient(rgba(0,0,0,.62),rgba(0,0,0,.78)),url('https://images.unsplash.com/photo-1550547660-d9450f859349?q=80&w=1600');background-size:cover;background-attachment:fixed;color:white;}
    .glass{background:rgba(20,20,20,.42);border:1px solid rgba(255,255,255,.14);border-radius:22px;backdrop-filter:blur(22px);box-shadow:0 15px 35px rgba(0,0,0,.18);overflow:hidden;color:white;}
    .hero-img{width:100%;height:320px;object-fit:cover;}
    .section-title{font-weight:800;color:white;}
    .muted{color:rgba(255,255,255,.74);}
    .food-img{width:100%;height:160px;object-fit:cover;border-radius:16px;}
    .stat{border-radius:16px;background:rgba(255,255,255,.08);padding:16px;text-align:center;}
    @media(max-width:768px){.hero-img{height:220px}.glass{border-radius:18px}.table-responsive{font-size:.88rem}}
</style>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container py-5">
    <div class="glass mb-4">
        <img class="hero-img" th:src="${restaurant.image != null and !restaurant.image.isEmpty()} ? @{'/uploads/' + ${restaurant.image}} : 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&q=80&w=1200'">
        <div class="p-4 p-md-5">
            <div class="d-flex flex-wrap justify-content-between gap-3">
                <div>
                    <h1 class="section-title" th:text="${restaurant.name}">Restaurant</h1>
                    <p class="muted mb-2" th:text="${restaurant.description}">Description</p>
                    <span class="badge bg-warning text-dark" th:text="${restaurant.cuisine}">Cuisine</span>
                    <span class="badge bg-light text-dark">📍 <span th:text="${restaurant.city}">City</span></span>
                </div>
                <div class="text-md-end">
                    <p class="mb-1"><strong>Address:</strong> <span th:text="${restaurant.address}"></span></p>
                    <p class="mb-1" th:if="${owner != null}"><strong>Owner:</strong> <span th:text="${owner.name}"></span></p>
                    <p class="mb-0" th:if="${owner != null}"><strong>Contact:</strong> <span th:text="${owner.phone}"></span></p>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-4" th:if="${session.user != null and (session.user.role == 'ADMIN' or session.user.role == 'OWNER')}">
        <div class="col-md-4"><div class="stat"><h3 th:text="${totalOrders}">0</h3><small>Total Orders</small></div></div>
        <div class="col-md-4"><div class="stat"><h3 th:text="${completedOrders}">0</h3><small>Completed Orders</small></div></div>
        <div class="col-md-4"><div class="stat"><h3 th:text="${activeOrders}">0</h3><small>Active Orders</small></div></div>
    </div>

    <h3 class="section-title mb-3">Foods</h3>
    <div class="row g-4 mb-5">
        <div class="col-lg-3 col-md-4 col-sm-6" th:each="f : ${foods}">
            <div class="glass p-3 h-100">
                <img class="food-img mb-3" th:src="${f.image != null and !f.image.isEmpty()} ? @{'/uploads/' + ${f.image}} : 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600'">
                <span class="badge bg-warning text-dark" th:text="${f.category}">Category</span>
                <h5 class="mt-2" th:text="${f.name}">Food</h5>
                <p class="muted small" th:text="${f.description}">Description</p>
                <strong>Rs. <span th:text="${#numbers.formatDecimal(f.price,1,2)}"></span></strong>
                <form th:action="@{/cart/add}" method="post" class="mt-3"
                      th:if="${session.user != null and session.user.role == 'CUSTOMER'}">
                    <input type="hidden" name="foodId" th:value="${f.id}">
                    <input class="form-control mb-2" type="number" name="qty" value="1" min="1">
                    <button class="btn btn-brand w-100">Add to Cart 🛒</button>
                    <button type="submit" th:formaction="@{/order/buy-now}" class="btn btn-outline-brand w-100 mt-2">Buy Now ⚡</button>
                </form>
                <a th:if="${session.user == null}" th:href="@{/login}" class="btn btn-outline-brand w-100 mt-3">Login to Order</a>
            </div>
        </div>
        <div class="col-12" th:if="${#lists.isEmpty(foods)}"><div class="glass p-4 text-center">No foods added yet.</div></div>
    </div>

    <div class="glass p-4 mb-4" th:if="${session.user != null and session.user.role == 'ADMIN'}">
        <h3 class="section-title">Orders Summary</h3>
        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle">
                <thead><tr><th>ID</th><th>Items</th><th>Status</th><th>Total</th><th>Created</th><th>Completed</th></tr></thead>
                <tbody>
                <tr th:each="o : ${orders}">
                    <td th:text="${o.id}"></td><td th:text="${o.items}"></td><td th:text="${o.status}"></td>
                    <td>Rs. <span th:text="${#numbers.formatDecimal(o.total,1,2)}"></span></td>
                    <td th:text="${o.createdAt}"></td><td th:text="${o.completedAt}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="glass p-4" th:if="${reviews != null}">
        <h3 class="section-title">Ratings & Reviews</h3>
        <div th:if="${#lists.isEmpty(reviews)}" class="muted">No reviews yet.</div>
        <div class="border-bottom border-secondary py-2" th:each="rv : ${reviews}">
            <strong>⭐ <span th:text="${rv.rating}"></span>/5</strong>
            <p class="mb-1" th:text="${rv.comment}"></p>
            <small class="muted" th:text="${rv.customerName}"></small>
        </div>
    </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
