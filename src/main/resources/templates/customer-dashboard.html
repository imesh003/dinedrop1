<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('Customer Dashboard - DineDrop')}"></head>

<style>

    :root{
        --glass-bg: rgba(20,20,20,0.35);
        --glass-border: rgba(255,255,255,0.16);

        --text-main: #ffffff;
        --text-soft: rgba(255,255,255,0.88);

        --blur: blur(20px);
        --shadow: 0 8px 32px rgba(0,0,0,0.28);

        --accent: #ff7b54;
        --radius: 30px;
    }

    /* Background */

    body{
        min-height:100vh;

        background:
                linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.5)),
                url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1600');

        background-size:cover;
        background-position:center;
        background-attachment:fixed;

        font-family: "SF Pro Display", sans-serif;
        color: var(--text-main);

        text-shadow: 0 1px 3px rgba(0,0,0,0.45);

        overflow-x:hidden;
    }

    /* Floating Glow */

    body::before,
    body::after{
        content:'';
        position:fixed;
        width:300px;
        height:300px;
        border-radius:50%;
        filter: blur(90px);
        z-index:0;
    }

    body::before{
        background:#ff9966;
        top:-100px;
        left:-80px;
        opacity:0.45;
    }

    body::after{
        background:#6dd5fa;
        bottom:-120px;
        right:-100px;
        opacity:0.4;
    }

    /* Main Container */

    .container{
        position:relative;
        z-index:2;
    }

    /* Typography */

    h1,h2,h3,h4,h5{
        color:#fff;
        font-weight:700;
        letter-spacing:-0.5px;
    }

    p{
        color:rgba(255,255,255,0.95);
    }

    .text-muted{
        color:rgba(255,255,255,0.82) !important;
    }

    /* Section Title */

    .section-title{
        margin-bottom:20px;
    }

    .section-title small{
        display:block;
        color:rgba(255,255,255,0.7);
        text-transform:uppercase;
        letter-spacing:1px;
        font-size:13px;
        margin-bottom:5px;
    }

    /* Glass Cards */

    .dash-card,
    .card-rest{
        background: var(--glass-bg);

        backdrop-filter: var(--blur);
        -webkit-backdrop-filter: var(--blur);

        border:1px solid var(--glass-border);

        border-radius: var(--radius);

        box-shadow: var(--shadow);

        transition:0.35s ease;

        overflow:hidden;
    }

    .dash-card:hover,
    .card-rest:hover{
        transform:translateY(-6px) scale(1.01);
        box-shadow:0 16px 40px rgba(0,0,0,0.35);
    }

    /* Dashboard Cards */

    .dash-card{
        padding:24px;
    }

    .dash-label{
        color:rgba(255,255,255,0.82);
        text-transform:uppercase;
        font-size:13px;
        font-weight:600;
        letter-spacing:1px;
        margin-bottom:10px;
    }

    .dash-stat{
        font-size:38px;
        font-weight:700;
        color:white;
        margin-bottom:10px;
        text-shadow:0 2px 8px rgba(0,0,0,0.45);
    }

    .dash-card a{
        text-decoration:none;
        color:white !important;
        font-weight:600;
    }

    /* Search Bar */

    .input-group{
        background:rgba(255,255,255,0.12);

        backdrop-filter: blur(18px);

        border-radius:22px;

        overflow:hidden;

        border:1px solid rgba(255,255,255,0.16);
    }

    .form-control{
        background:transparent !important;
        border:none !important;

        color:white !important;

        padding:18px;

        font-size:15px;
        font-weight:500;
    }

    .form-control:focus{
        box-shadow:none;
    }

    .form-control::placeholder{
        color:rgba(255,255,255,0.72);
    }

    /* Buttons */

    .btn-brand{
        background:rgba(255,255,255,0.22);

        border:1px solid rgba(255,255,255,0.18);

        color:white !important;

        font-weight:600;

        padding:0 28px;

        transition:0.3s;
    }

    .btn-brand:hover{
        background:rgba(255,255,255,0.32);
        color:white;
    }

    /* Restaurant Cards */

    .card-rest img{
        width:100%;
        height:220px;
        object-fit:cover;
    }

    .card-body{
        padding:22px;
    }

    .badge-cuisine{
        display:inline-block;

        background:rgba(255,255,255,0.14);

        border:1px solid rgba(255,255,255,0.15);

        color:white;

        padding:8px 14px;

        border-radius:999px;

        font-size:12px;

        backdrop-filter:blur(10px);
    }

    .card-rest h5{
        margin-top:14px;
        color:white;
        font-size:22px;
        text-shadow:0 2px 6px rgba(0,0,0,0.4);
    }

    .card-rest .btn{
        margin-top:10px;
        border-radius:16px;
        padding:10px 18px;
    }

    /* Empty State */

    .empty{
        text-align:center;
        padding:80px 20px;
    }

    .emoji{
        font-size:60px;
        margin-bottom:10px;
    }

    /* Responsive */

    @media(max-width:768px){

        .dash-stat{
            font-size:30px;
        }

        .card-rest img{
            height:180px;
        }

        .container{
            padding-left:18px;
            padding-right:18px;
        }
    }

</style>

<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container py-5">

    <!-- Greeting -->

    <h2 class="mb-1">
        Hi,
        <span th:text="${session.user.name}">
            Customer
        </span>
        👋
    </h2>

    <p class="text-muted">
        What are you craving today?
    </p>

    <!-- Dashboard Cards -->

    <div class="row g-4 mb-4">

        <!-- Cart -->

        <div class="col-md-3">
            <div class="dash-card">

                <div class="dash-label">
                    Cart
                </div>

                <div class="dash-stat"
                     th:text="${cartCount}">
                    0
                </div>

                <a th:href="@{/cart}">
                    View cart →
                </a>

            </div>
        </div>

        <!-- Orders -->

        <div class="col-md-3">
            <div class="dash-card">

                <div class="dash-label">
                    Orders
                </div>

                <div class="dash-stat"
                     th:text="${#lists.size(orders)}">
                    0
                </div>

                <a th:href="@{/customer/orders}">
                    Order history →
                </a>

            </div>
        </div>

        <!-- Reviews -->

        <div class="col-md-3">
            <div class="dash-card">

                <div class="dash-label">
                    Reviews
                </div>

                <div class="dash-stat"
                     th:text="${#lists.size(reviews)}">
                    0
                </div>

                <a th:href="@{/reviews}">
                    My reviews →
                </a>

            </div>
        </div>

        <!-- Profile -->

        <div class="col-md-3">
            <div class="dash-card">

                <div class="dash-label">
                    Profile
                </div>

                <div class="dash-stat">
                    ⚙️
                </div>

                <a th:href="@{/profile}">
                    Edit profile →
                </a>

            </div>
        </div>

    </div>

    <!-- Restaurant Section -->

    <h4 class="section-title mt-5">
        <small>Restaurants</small>
        Order from your favourites
    </h4>

    <!-- Search -->

    <form class="mb-4"
          th:action="@{/foods}"
          method="get">

        <div class="input-group">

            <input class="form-control"
                   name="q"
                   placeholder="🔍 Search foods (pizza, burger, sushi...)">

            <button class="btn btn-brand">
                Search
            </button>

        </div>

    </form>

    <!-- Restaurants -->

    <div class="row g-4">

        <div class="col-md-4"
             th:each="r : ${restaurants}">

            <div class="card-rest h-100">

                <img class="card-img-top"

                     th:src="${r.image != null and !r.image.isEmpty()}
                     ? @{'/uploads/' + ${r.image}}
                     : 'https://images.unsplash.com/photo-1552566626-52f8b828add9?w=600'">

                <div class="card-body">

                    <span class="badge-cuisine"
                          th:text="${r.cuisine}">
                        Cuisine
                    </span>

                    <h5 th:text="${r.name}">
                        Restaurant Name
                    </h5>

                    <p class="text-muted small">
                        📍
                        <span th:text="${r.city}">
                            City
                        </span>
                    </p>

                    <a th:href="@{/foods(restaurantId=${r.id})}"
                       class="btn btn-brand btn-sm">

                        View Menu

                    </a>

                </div>

            </div>

        </div>

        <!-- Empty State -->

        <div class="col-12 empty"
             th:if="${#lists.isEmpty(restaurants)}">

            <div class="emoji">
                🥘
            </div>

            <p>
                No restaurants yet — check back soon!
            </p>

        </div>

    </div>

</div>

<footer th:replace="~{fragments :: footer}"></footer>

<div th:replace="~{fragments :: scripts}"></div>

</body>
</html>
