<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DineDrop | Edit Owner Profile</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/icon?family=Material+Icons">

    <style>
        :root {
            --primary-gold: #D4AF37;
            --dark-charcoal: #121212;
            --danger-red: #dc3545;
            --soft-bg: #f8f9fa;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--soft-bg);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-container {
            width: 95%;
            max-width: 1000px;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
            display: flex;
            margin: 20px;
        }

        /* IMAGE SIDE */
        .settings-visual {
            flex: 1;
            background: linear-gradient(rgba(18, 18, 18, 0.5), rgba(18, 18, 18, 0.5)),
            url('https://plus.unsplash.com/premium_photo-1681841594224-ad729a249113?q=80&w=754&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-size: cover;
            background-position: center;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: white;
        }

        /* FORM SIDE */
        .settings-form-content {
            flex: 1.2;
            padding: 50px 60px;
        }

        .brand-tag {
            color: var(--primary-gold);
            font-weight: 800;
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--dark-charcoal);
            margin-bottom: 30px;
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid #eee;
            background: #fdfdfd;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-gold);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
            background: white;
        }

        .btn-update {
            background: var(--dark-charcoal);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-update:hover {
            background: var(--primary-gold);
            transform: translateY(-2px);
        }

        .danger-zone {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px dashed #eee;
        }

        .btn-delete {
            background: transparent;
            color: var(--danger-red);
            border: 1px solid #ffdada;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
            width: 100%;
        }

        .btn-delete:hover {
            background: #fff5f5;
            border-color: var(--danger-red);
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 25px;
            justify-content: center;
        }

        .back-link:hover {
            color: var(--dark-charcoal);
        }

        @media (max-width: 992px) {
            .settings-visual { display: none; }
            .settings-form-content { padding: 40px 30px; }
        }
    </style>
</head>

<body>

<div class="settings-container">

    <!-- VISUAL SIDE -->
    <div class="settings-visual">
        <div>
            <span class="material-icons" style="font-size: 40px; color: var(--primary-gold);"></span>
            <h3 class="mt-3 fw-bold">Settings</h3>
            <p class="opacity-75">Keep your restaurant profile updated to ensure smooth operations and customer trust.</p>
        </div>
        <div class="small opacity-50">
            &copy; 2026 DineDrop Professional
        </div>
    </div>

    <!-- FORM SIDE -->
    <div class="settings-form-content">
        <span class="brand-tag">DINEDROP OWNER</span>
        <h2>Edit Profile</h2>

        <!-- UPDATE FORM -->
        <form action="/owner/update" method="post">

            <div class="row">
                <div class="col-md-12">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Update your name" required>
                </div>

                <div class="col-md-12">
                    <label class="form-label">New Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Leave blank to keep current">
                </div>

                <div class="col-md-12">
                    <label class="form-label">Business Address</label>
                    <input type="text" name="address" class="form-control" placeholder="Update office/restaurant address">
                </div>

                <div class="col-md-12">
                    <label class="form-label">Contact Phone</label>
                    <input type="text" name="phone" class="form-control" placeholder="Update phone number">
                </div>
            </div>

            <button type="submit" class="btn-update">Save Changes</button>
        </form>

        <!-- DANGER ZONE -->
        <div class="danger-zone">
            <p class="small text-muted mb-3">Looking to close your account? This action cannot be undone.</p>
            <form action="/owner/delete" method="post" onsubmit="return confirm('Are you absolutely sure? This will delete all restaurant data permanently.')">
                <button type="submit" class="btn-delete">
                    <span class="material-icons align-middle" style="font-size: 16px;"></span>
                    Delete My Account
                </button>
            </form>
        </div>

        <a href="/owner/dashboard" class="back-link">
            <span class="material-icons" style="font-size: 18px;"></span>
            Back to Dashboard
        </a>
    </div>

</div>

</body>
</html>
