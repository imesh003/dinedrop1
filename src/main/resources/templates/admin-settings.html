<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Revenue - DineDrop Admin')}"></head>
<head th:replace="~{fragments :: head('Commission Settings - DineDrop Admin')}"></head>
<style>
    body{ min-height:100vh;
        background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.6)),
        url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1600');
        background-size:cover; background-attachment:fixed;
        color:white; font-family:"SF Pro Display", sans-serif; text-shadow:0 1px 3px rgba(0,0,0,0.45); }
    body::before, body::after{ content:''; position:fixed; width:320px; height:320px;
        border-radius:50%; filter:blur(100px); z-index:0; }
    body::before{ background:#ff9966; top:-120px; left:-100px; opacity:0.45; }
    body::after{ background:#6dd5fa; bottom:-120px; right:-100px; opacity:0.4; }
    .container{ position:relative; z-index:2; }
    .glass{ background:rgba(20,20,20,0.35); backdrop-filter:blur(22px);
        border:1px solid rgba(255,255,255,0.15); border-radius:24px; padding:28px; color:white; }
    .form-control{ background:rgba(255,255,255,0.1)!important; border:1px solid rgba(255,255,255,0.2)!important;
        color:white!important; border-radius:14px; padding:12px; }
    .btn-brand{ background:rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.18);
        color:white; border-radius:16px; font-weight:600; padding:10px 18px; }
    .btn-brand:hover{ background:rgba(255,255,255,0.28); color:white; }
    label{ font-weight:600; color:rgba(255,255,255,0.85); }
</style>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container py-5">
    <h2 class="mb-4">⚙️ Commission Settings</h2>
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="glass">
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                <p>Configure platform-wide commission rates. Changes apply to all new orders.</p>
                <form method="post" th:action="@{/admin/settings}">
                    <div class="mb-3">
                        <label>Restaurant Commission (% of food price)</label>
                        <input class="form-control" type="number" step="0.01" min="0"
                               name="restaurantCommissionPct"
                               th:value="${settings.restaurantCommissionPct}" required>
                        <small class="text-muted">Added on top of base food price; customer pays the higher final price.</small>
                    </div>
                    <div class="mb-3">
                        <label>Rider Commission (% of delivery fee)</label>
                        <input class="form-control" type="number" step="0.01" min="0"
                               name="riderCommissionPct"
                               th:value="${settings.riderCommissionPct}" required>
                        <small class="text-muted">Deducted from rider's delivery fee as platform fee.</small>
                    </div>
                    <button class="btn btn-brand w-100">Save Settings</button>
                </form>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments :: footer}"></footer>
<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
