<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('Edit Review - DineDrop')}"></head>

<style>

    body{
        min-height:100vh;

        background:
                linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.55)),
                url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1600');

        background-size:cover;
        background-position:center;
        background-attachment:fixed;

        font-family:"SF Pro Display", sans-serif;
        color:white;

        text-shadow:0 1px 3px rgba(0,0,0,0.45);
    }

    /* glow */

    body::before,
    body::after{
        content:'';
        position:fixed;
        width:320px;
        height:320px;
        border-radius:50%;
        filter:blur(100px);
        z-index:0;
    }

    body::before{
        background:#ff9966;
        top:-120px;
        left:-100px;
        opacity:0.45;
    }

    body::after{
        background:#6dd5fa;
        bottom:-120px;
        right:-100px;
        opacity:0.4;
    }

    /* container */

    .container{
        position:relative;
        z-index:2;
    }

    /* ===== GLASS CARD ===== */

    .auth-card{

        max-width:520px;

        margin:80px auto;

        padding:35px;

        background:rgba(20,20,20,0.35);

        backdrop-filter:blur(22px);
        -webkit-backdrop-filter:blur(22px);

        border:1px solid rgba(255,255,255,0.15);

        border-radius:32px;

        box-shadow:0 8px 32px rgba(0,0,0,0.3);

        color:white;
    }

    /* ===== 🔥 TITLE FIX (EDIT YOUR REVIEW) ===== */

    .auth-card h3{
        font-weight:800;
        font-size:30px;
        letter-spacing:0.5px;

        color:#ffffff;

        text-shadow:
                0 2px 10px rgba(0,0,0,0.8),
                0 0 25px rgba(255,255,255,0.25);

        margin-bottom:12px;
    }

    /* muted text */

    .text-muted{
        color:rgba(255,255,255,0.75) !important;
    }

    /* labels */

    label{
        font-weight:600;
        margin-bottom:6px;
        color:rgba(255,255,255,0.85);
    }

    /* inputs */

    .form-control,
    .form-select{
        background:rgba(255,255,255,0.10) !important;

        border:1px solid rgba(255,255,255,0.15) !important;

        color:white !important;

        border-radius:14px;

        padding:12px;
    }

    .form-select option{
        color:black;
    }

    .form-control:focus,
    .form-select:focus{
        box-shadow:none;
        border-color:rgba(255,255,255,0.35) !important;
    }

    /* textarea */

    textarea{
        resize:none;
    }

    /* button */

    .btn-brand{
        background:rgba(255,255,255,0.18);

        border:1px solid rgba(255,255,255,0.18);

        color:white !important;

        font-weight:600;

        border-radius:16px;

        padding:12px;

        transition:0.3s;
    }

    .btn-brand:hover{
        background:rgba(255,255,255,0.28);
    }

    /* restaurant name emphasis */

    .text-muted strong{
        color:#ffffff;
    }

    /* responsive */

    @media(max-width:768px){
        .auth-card{
            margin:40px 15px;
            padding:25px;
        }
    }

</style>

<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container">

    <div class="auth-card">

        <!-- ⭐ IMPROVED TITLE -->
        <h3>✏️ Edit your review</h3>

        <p class="text-muted"
           th:if="${restaurant != null}">
            From <strong th:text="${restaurant.name}"></strong>
        </p>

        <form method="post"
              th:action="@{'/review/edit/' + ${review.id}}">

            <!-- Rating -->
            <div class="mb-3">

                <label>Rating (1-5)</label>

                <select class="form-select" name="rating">

                    <option th:each="i : ${#numbers.sequence(5,1)}"
                            th:value="${i}"
                            th:text="${'★'.repeat(i)} + ' (' + ${i} + ')'"
                            th:selected="${i == review.rating}">
                    </option>

                </select>

            </div>

            <!-- Comment -->
            <div class="mb-3">

                <label>Comment</label>

                <textarea class="form-control"
                          name="comment"
                          rows="3"
                          required
                          th:text="${review.comment}">
                </textarea>

            </div>

            <!-- Submit -->
            <button class="btn btn-brand w-100">
                Update Review
            </button>

        </form>

    </div>

</div>

<div th:replace="~{fragments :: scripts}"></div>

</body>
</html>
