<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('Browse Restaurants - DineDrop')}"></head>

<style>
    body {
        background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.75)),
        url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&q=80&w=2000');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
    }
    .hero-banner { padding: 80px 0 35px; text-align:center; }
    .gold-tag { color:#D4AF37; text-transform:uppercase; letter-spacing:4px; font-weight:700; font-size:.8rem; }
    .res-card { background:rgba(20,20,20,.42); border:1px solid rgba(255,255,255,.14); border-radius:25px; overflow:hidden; height:100%; backdrop-filter:blur(22px); box-shadow:0 15px 35px rgba(0,0,0,.18); transition:.3s; }
    .res-card:hover { transform:translateY(-8px); box-shadow:0 30px 60px rgba(0,0,0,.25); }
    .res-img-wrapper { position:relative; height:220px; overflow:hidden; }
    .res-img { width:100%; height:100%; object-fit:cover; transition:.5s; }
    .res-card:hover .res-img { transform:scale(1.06); }
    .badge-location { position:absolute; top:16px; right:16px; background:rgba(255,255,255,.92); color:#111; padding:6px 14px; border-radius:50px; font-size:.75rem; font-weight:700; }
    .res-content { padding:26px; color:white; }
    .res-name { font-size:1.45rem; font-weight:800; margin-bottom:8px; color:white; }
    .res-desc { color:rgba(255,255,255,.75); font-size:.92rem; line-height:1.6; min-height:48px; }
    .rating-pill { color:#D4AF37; font-weight:700; }

    select.form-control option { background:#fff !important; color:#111 !important; text-shadow:none !important; }
    @media(max-width:768px){ .hero-banner{padding-top:45px;} .res-img-wrapper{height:185px;} .res-content{padding:20px;} }
</style>

<body>
<nav th:replace="~{fragments :: navbar}"></nav>

<header class="hero-banner">
    <div class="container">
        <span class="gold-tag">DineDrop</span>
        <h1 class="fw-bold display-5">Browse Restaurants</h1>
        <p class="lead opacity-75" th:if="${customerCity != null and !customerCity.isBlank()}">
            Restaurants available in <strong th:text="${customerCity}"></strong>
        </p>
        <p class="lead opacity-75" th:if="${customerCity == null or customerCity.isBlank()}">
            Exceptional flavors, delivered to your doorstep.
        </p>
    </div>

    <form th:if="${session.user != null and session.user.role == 'CUSTOMER'}"
          method="post" th:action="@{/customer/city}"
          class="mb-4 d-flex flex-wrap gap-2 align-items-center justify-content-center">
        <label class="small opacity-75 mb-0">Current City</label>
        <select class="form-control" name="city" style="max-width:260px;">
            <option value="">Select city</option>
            <option th:each="d : ${districts}" th:value="${d}" th:text="${d}"
                    th:selected="${customerCity != null and d.equalsIgnoreCase(customerCity)}"></option>
        </select>
        <button class="btn btn-brand btn-sm">Change current city</button>
    </form>

</header>

<main class="container my-4 pb-5">
    <div class="row g-4">
        <div class="col-lg-4 col-md-6" th:each="r : ${restaurants}">
            <div class="res-card">
                <div class="res-img-wrapper">
                    <img class="res-img" th:src="${r.image != null and !r.image.isEmpty()} ? @{'/uploads/' + ${r.image}} : 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&q=80&w=800'" alt="Restaurant">
                    <div class="badge-location">📍 <span th:text="${r.city}">City</span></div>
                </div>
                <div class="res-content">
                    <h3 class="res-name" th:text="${r.name}">Restaurant</h3>
                    <div class="d-flex justify-content-between small mb-2">
                        <span th:text="${r.cuisine}">Cuisine</span>
                        <span class="rating-pill">⭐ <span th:text="${reviewService != null ? #numbers.formatDecimal(reviewService.averageForRestaurant(r.id),1,1) : '0.0'}">0.0</span></span>
                    </div>
                    <p class="res-desc" th:text="${r.description}">Description</p>
                    <a class="btn btn-brand w-100" th:href="@{'/restaurants/' + ${r.id}}">View Restaurant & Foods</a>
                </div>
            </div>
        </div>
        <div class="col-12" th:if="${#lists.isEmpty(restaurants)}">
            <div class="alert alert-dark text-center rounded-4">No restaurants found for your city.</div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>
<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
