<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('Edit Restaurant - DineDrop')}"></head>

<style>
    :root{
        --glass-bg: rgba(255,255,255,0.08);
        --glass-border: rgba(255,255,255,0.15);
        --blur: blur(20px);
        --shadow: 0 8px 32px rgba(0,0,0,0.3);
        --radius: 28px;
    }

    /* Background */
    body{
        min-height:100vh;
        background:
                linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.6)),
                url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1600');
        background-size:cover;
        background-position:center;
        background-attachment:fixed;
        font-family:"SF Pro Display", sans-serif;
        color:white;
    }

    /* Glow */
    body::before, body::after{
        content:'';
        position:fixed;
        width:300px;
        height:300px;
        border-radius:50%;
        filter:blur(120px);
        z-index:0;
    }
    body::before{
        background:#ff7a18;
        top:-100px;
        left:-80px;
        opacity:0.5;
    }
    body::after{
        background:#00c6ff;
        bottom:-100px;
        right:-80px;
        opacity:0.4;
    }

    .container{ position:relative; z-index:2; }

    /* Glass Card */
    .glass-card{
        background: var(--glass-bg);
        backdrop-filter: var(--blur);
        -webkit-backdrop-filter: var(--blur);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 28px;
    }

    /* Inputs */
    .form-control, textarea{
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.15);
        color: white !important;
        border-radius: 14px;
    }

    .form-control::placeholder{
        color: rgba(255,255,255,0.5);
    }

    /* Labels */
    label{
        font-size: 13px;
        color: rgba(255,255,255,0.75);
        margin-bottom:6px;
    }

    /* Buttons */
    .btn-brand{
        background: linear-gradient(135deg,#ff7a18,#ff3d77);
        border:none;
        color:white;
        border-radius:14px;
        font-weight:600;
    }

    .btn-outline-brand{
        border:1px solid rgba(255,255,255,0.3);
        color:white;
        border-radius:14px;
    }

    /* Map */
    .map-pin-canvas,
    .location-preview-map{
        border-radius: 18px;
        overflow:hidden;
        border:1px solid rgba(255,255,255,0.15);
    }

    /* Title */
    .page-title{
        font-weight:700;
        margin-bottom:18px;
    }

    small, .text-muted{
        color: rgba(255,255,255,0.7) !important;
    }
</style>

<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<div class="container py-5">

    <!-- Card -->
    <div class="glass-card mx-auto" style="max-width:820px">

        <h3 class="page-title">✏️ Edit Restaurant</h3>

        <form method="post"
              th:action="@{'/owner/restaurant/edit/' + ${r.id}}"
              enctype="multipart/form-data">

            <!-- Name -->
            <div class="mb-3">
                <label>Name</label>
                <input class="form-control" name="name" th:value="${r.name}" required>
            </div>

            <!-- City + Cuisine -->
            <div class="row">
                <div class="col mb-3">
                    <label>City</label>
                    <input class="form-control" name="city" th:value="${r.city}" required>
                </div>
                <div class="col mb-3">
                    <label>Cuisine</label>
                    <input class="form-control" name="cuisine" th:value="${r.cuisine}" required>
                </div>
            </div>

            <!-- Address -->
            <div class="mb-3">
                <label>Address</label>
                <input class="form-control" name="address" th:value="${r.address}" required>
            </div>

            <!-- Map Section -->
            <div class="glass-card mb-3">

                <h6 class="mb-2">📍 Store Location Pin</h6>

                <p class="small text-muted mb-3">
                    Select location using map or GPS.
                </p>

                <div id="storePinMap"
                     class="map-pin-canvas w-100 mb-3"
                     style="height:220px"></div>

                <div class="row g-2">

                    <div class="col-md-4">
                        <label>Latitude</label>
                        <input type="number" step="any"
                               class="form-control"
                               id="latitude"
                               name="latitude"
                               th:value="${r.latitude}">
                    </div>

                    <div class="col-md-4">
                        <label>Longitude</label>
                        <input type="number" step="any"
                               class="form-control"
                               id="longitude"
                               name="longitude"
                               th:value="${r.longitude}">
                    </div>

                    <div class="col-md-4 d-grid gap-2">

                        <button type="button"
                                class="btn btn-brand btn-sm"
                                id="addStorePin">
                            Add Location
                        </button>

                        <button type="button"
                                class="btn btn-outline-brand btn-sm"
                                id="useStoreLocation">
                            Use My Location
                        </button>

                    </div>

                </div>

                <div class="d-flex gap-2 mt-3 flex-wrap">

                    <button type="button"
                            class="btn btn-outline-brand btn-sm"
                            id="clearStorePin">
                        Reset
                    </button>

                    <a target="_blank"
                       class="btn btn-outline-brand btn-sm"
                       id="openStoreMap"
                       th:href="${r.googleMapsUrl}">
                        Open Maps ↗
                    </a>

                </div>

                <small class="d-block mt-2"
                       id="coordText">
                    Location preview
                </small>

                <iframe id="storeMap"
                        class="location-preview-map w-100 mt-3"
                        style="height:220px"
                        th:src="${r.mapEmbedUrl}"
                        loading="lazy">
                </iframe>

            </div>

            <!-- Description -->
            <div class="mb-3">
                <label>Description</label>
                <textarea class="form-control"
                          name="description"
                          rows="3"
                          th:text="${r.description}">
                </textarea>
            </div>

            <!-- Image -->
            <div class="mb-3">
                <label>Replace Image</label>
                <input type="file"
                       class="form-control"
                       name="image"
                       accept="image/*">
            </div>

            <!-- Submit -->
            <button class="btn btn-brand w-100 py-2">
                Save Changes
            </button>

        </form>

    </div>

</div>

<div th:replace="~{fragments :: scripts}"></div>

</body>
</html>
