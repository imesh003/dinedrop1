<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Owner Restaurants</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Your Restaurants</h2>

<a href="/restaurant/add" class="btn btn-success mb-3">+ Add Restaurant</a>

<table class="table table-bordered">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Location</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="r : ${restaurants}">
        <td th:text="${r.id}"></td>
        <td th:text="${r.name}"></td>
        <td th:text="${r.location}"></td>
        <td>
            <a th:href="@{'/restaurant/edit/' + ${r.id}}" class="btn btn-warning btn-sm">Edit</a>
            <a th:href="@{'/restaurant/delete/' + ${r.id}}" class="btn btn-danger btn-sm">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
